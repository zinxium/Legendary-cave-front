version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: legendary-cave-mysql
    restart: always
    environment:
      MYSQL_DATABASE: legendary_cave
      MYSQL_USER: legendary_user
      MYSQL_PASSWORD: legendary_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/database/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: legendary-cave-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
